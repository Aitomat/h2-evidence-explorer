<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>H2 Evidenz-Explorer — Einbettungs-Beispiel (DE)</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; color: #1a1a1a; }
    .wrap { max-width: 960px; margin: 0 auto; padding: 24px 16px; }
    h1 { font-size: 1.4rem; margin: 0 0 .25rem; }
    p.sub { color: #555; margin: 0 0 1.25rem; }
    iframe { display: block; }
    .credit { font-size: .85rem; color: #555; margin-top: .75rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>H2 Evidenz-Explorer</h1>
    <p class="sub">Ein kostenfreier, stets aktueller Überblick über Humanstudien zu
       molekularem Wasserstoff (H₂). Keine medizinische Beratung.</p>

    <!-- Einbettung: deutsches Widget -->
    <iframe id="h2ee"
            src="https://h2medizin.org/widget/"
            title="H2 Evidenz-Explorer"
            width="100%"
            height="900"
            style="border:0;width:100%;max-width:100%;"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade">
    </iframe>

    <p class="credit">Daten: <a href="https://h2medizin.org">h2medizin.org</a></p>
  </div>

  <!-- Optional: Iframe automatisch an die Inhaltshöhe anpassen -->
  <script>
    window.addEventListener('message', function (e) {
      if (e.origin !== 'https://h2medicine.org' && e.origin !== 'https://h2medizin.org') return;
      var data = e.data || {};
      if (data && data.h2ee && typeof data.height === 'number') {
        var f = document.getElementById('h2ee');
        if (f) f.style.height = data.height + 'px';
      }
    });
  </script>
</body>
</html>
